<!DOCTYPE html>
<html>
  <head>
    <title>Weather</title>
    <style>
     body { font-family: sans-serif; max-width: 900px; margin: 0 auto; padding: 1em; }
      table { border-collapse: collapse; width: 100%; margin-bottom: 2em; }
      th, td { border: 1px solid #ccc; padding: 4px 8px; text-align: center; font-size: 0.85em; }
      th { background: #eee; }
      .summary { display: flex; gap: 2em; flex-wrap: wrap; margin-bottom: 2em; }
      .card { background: #f5f5f5; border-radius: 8px; padding: 1em 1.5em; }
      .card h3 { margin: 0 0 0.5em 0; }

      /* Humidity: white (low) to blue (high), range 0–100% */
      td.humidity-0 { background: hsl(210, 100%, 100%); }
      td.humidity-10 { background: hsl(210, 100%, 95%); }
      td.humidity-20 { background: hsl(210, 100%, 90%); }
      td.humidity-30 { background: hsl(210, 100%, 85%); }
      td.humidity-40 { background: hsl(210, 100%, 78%); }
      td.humidity-50 { background: hsl(210, 100%, 70%); }
      td.humidity-60 { background: hsl(210, 100%, 62%); }
      td.humidity-70 { background: hsl(210, 100%, 54%); }
      td.humidity-80 { background: hsl(210, 100%, 46%); }
      td.humidity-90 { background: hsl(210, 100%, 38%); }
      td.humidity-100 { background: hsl(210, 100%, 30%); }

      /* Temperature: blue (low) to red (high), green centered on 80°F (~27°C) */
      td.temp-verycold { background: hsl(240, 80%, 60%); }   /* -10 to 0°C */
      td.temp-cold { background: hsl(200, 80%, 65%); }       /* 0 to 10°C */
      td.temp-cool { background: hsl(160, 60%, 65%); }       /* 10 to 18°C */
      td.temp-mild { background: hsl(140, 60%, 65%); }       /* 18 to 24°C */
      td.temp-warm { background: hsl(120, 70%, 60%); }       /* 24 to 30°C (80°F) */
      td.temp-hot { background: hsl(40, 90%, 60%); }         /* 30 to 35°C */
      td.temp-veryhot { background: hsl(0, 90%, 50%); }      /* 35°C+ */

      /* Wind speed: white (0) to green (~11 kts) to red (31+ kts) */
      td.wind-speed-calm { background: #ffffff; }             /* 0–6 kts */
      td.wind-speed-light { background: #d4f0c0; }           /* 6–12 kts */
      td.wind-speed-moderate { background: #a8e6a3; }        /* 12–17 kts */
      td.wind-speed-fresh { background: #f4e04a; }           /* 17–23 kts */
      td.wind-speed-strong { background: #f4a430; }          /* 23–31 kts */
      td.wind-speed-gale { background: #e05020; }            /* 31+ kts */

      /* Wind direction: green if SW–SE (135°–225°), orange otherwise */
      td.wind-dir-good { background: #a8e6a3; }
      td.wind-dir-mid { background: #f4e04a; }
      td.wind-dir-bad { background: #f4a460; }

      /* Precipitation: very light blue for any non-zero value */
      td.precip { background: #d0eeff; }

      .top-layout { display: flex; gap: 1em; align-items: flex-start; margin-bottom: 1em; }
      .webcam-img { max-width: 100%; flex: 1 1 auto; }
      .callout-col { display: flex; flex-direction: column; gap: 0.75em; min-width: 180px; max-width: 230px; }
      .callout-card { border-left: 4px solid #ccc; }
      .callout-card h3 { margin: 0 0 0.25em 0; }
     .callout-card p { margin: 0; font-size: 0.9em; }
      .callout-card .next-window { margin-top: 0.4em; font-size: 0.8em; color: #555; border-top: 1px solid #ddd; padding-top: 0.4em; }
     .overflow-auto { overflow-x: auto; }
      #kagi-search { margin-bottom: 1em; }
      #kagi-search input[type="text"] { width: 100%; padding: 0.5em 0.75em; font-size: 1em; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    </style>
  </head>

  <body>
    <form id="kagi-search" action="https://kagi.com/search" method="get" target="_self">
      <input
        type="text"
        name="q"
        placeholder="Search Kagi&hellip;"
        autofocus
      />
    </form>
    <div class="top-layout">
      <img src="webcam.jpg" class="webcam-img"/>
      <div class="callout-col">
        <div id="bike-callout" class="card callout-card">
          <h3>Bike</h3>
          <p id="bike-status">Checking&hellip;</p>
        </div>
        <div id="sail-callout" class="card callout-card">
          <h3>Sail</h3>
          <p id="sail-status">Checking&hellip;</p>
          <div id="sail-next-window" class="next-window" style="display:none"></div>
        </div>
      </div>
    </div>

    <h2>Hourly Forecast</h2>
    <div class="overflow-auto">
      <table id="hourly-table">
        <thead>
          <tr>
           <th>Time</th>
            <th>Temp (&deg;C / &deg;F)</th>
            <th>Feels Like (&deg;C / &deg;F)</th>
            <th>Wind (kts)</th>
            <th>Wind Dir (&deg;)</th>
            <th>P (mm)</th>
            <th>H (%)</th>
          </tr>
        </thead>
        <tbody id="hourly-body"></tbody>
      </table>
    </div>

    <script>
      // Convert m/s to knots
      function msToKts(ms) {
        if (ms === null || ms === undefined) return ms;
        return Math.round(ms * 1.94384 * 10) / 10;
      }

      fetch('./weather.json')
        .then(r => r.json())
        .then(data => {
          // Summary cards
          const today = data.today;
          const summary = document.querySelector('.callout-col');
          const avgKts = msToKts(today.wind.average_ms);
          const peakKts = msToKts(today.wind.peak_ms);
          // append to summary
          summary.innerHTML += `
            <div class="card callout-card">
              <h3>Wind: ${avgKts} kts</h3>
              <p>Peak: ${peakKts} kts</p>
              <p>Direction: ${today.wind_direction_degrees}&deg;</p>
            </div>
            <div class="card callout-card">
              <h3>Temperature: ${today.temperature.feels_like_avg_f}&deg;F</h3>
              <p>Low: ${today.temperature.low_c}&deg;C / ${today.temperature.low_f}&deg;F</p>
              <p>High: ${today.temperature.high_c}&deg;C / ${today.temperature.high_f}&deg;F</p>
            </div>
          `;

          // Hourly table
          const tbody = document.getElementById('hourly-body');
          const nowPlainDate = Temporal.Now.plainDateISO();
          const tomorrowPlainDate = nowPlainDate.add({ days: 1 });

          function formatTime(isoString) {
            const dt = Temporal.PlainDateTime.from(isoString);
            const date = dt.toPlainDate();
            const timeStr = dt.toPlainTime().toString({ smallestUnit: 'minute' });
            let dayLabel;
            if (Temporal.PlainDate.compare(date, nowPlainDate) === 0) {
              dayLabel = 'Today';
            } else if (Temporal.PlainDate.compare(date, tomorrowPlainDate) === 0) {
              dayLabel = 'Tomorrow';
            } else {
              dayLabel = new Date(isoString).toLocaleDateString(undefined, { weekday: 'long' });
            }
            return `${dayLabel}, ${timeStr}`;
          }

          function getTempClass(c) {
            if (c === null || c === undefined) return '';
            if (c < 0) return 'temp-verycold';
            if (c < 10) return 'temp-cold';
            if (c < 18) return 'temp-cool';
            if (c < 24) return 'temp-mild';
            if (c < 30) return 'temp-warm';
            if (c < 35) return 'temp-hot';
            return 'temp-veryhot';
          }

          // kts thresholds: 0–6, 6–12, 12–17, 17–23, 23–31, 31+
          function getWindSpeedClass(kts) {
            if (kts === null || kts === undefined) return '';
            if (kts < 6) return 'wind-speed-calm';
            if (kts < 12) return 'wind-speed-light';
            if (kts < 17) return 'wind-speed-moderate';
            if (kts < 23) return 'wind-speed-fresh';
            if (kts < 31) return 'wind-speed-strong';
            return 'wind-speed-gale';
          }

          function getWindDirClass(deg) {
            if (deg === null || deg === undefined) return '';
            if (deg >= 135 && deg <= 225) return 'wind-dir-good';
            if ((deg >= 90 && deg < 135) || (deg > 225 && deg <= 270)) return 'wind-dir-mid';
            return 'wind-dir-bad';
          }

         function getHumidityClass(h) {
            if (h === null || h === undefined) return '';
            const bucket = Math.min(100, Math.max(0, Math.round(h / 10) * 10));
            return `humidity-${bucket}`;
          }

          function getPrecipClass(mm) {
            if (mm === null || mm === undefined || mm === 0) return '';
            return 'precip';
          }

          // ── Callout logic ──────────────────────────────────────────────

          // Helper: is wind direction "green" (good) or "yellow" (mid)?
          function windDirIsSailable(deg) {
            if (deg === null || deg === undefined) return false;
            // green: 135–225, yellow: 90–135 or 225–270
            return (deg >= 90 && deg <= 270);
          }

          // Helper: is wind speed in "green" range for sailing? (6–17 kts)
          function windSpeedIsSailGreen(kts) {
            if (kts === null || kts === undefined) return false;
            return kts >= 6 && kts < 17;
          }

          // Today-only hourly rows
          const todayHourly = data.hourly.filter(h => {
            const dt = Temporal.PlainDateTime.from(h.time);
            return Temporal.PlainDate.compare(dt.toPlainDate(), nowPlainDate) === 0;
          });

          // ── Bike callout ──
          // Criteria: wind avg < 6 kts today AND feels-like between 8am–6pm > 32°F
          const windAvgKts = msToKts(today.wind.average_ms);
          const windOkForBike = windAvgKts < 6;

          const daytimeHours = todayHourly.filter(h => {
            const hour = Temporal.PlainDateTime.from(h.time).hour;
            return hour >= 8 && hour < 18;
          });
          const feelsLikeAboveFreezing = daytimeHours.length > 0 && daytimeHours.every(h => {
            const fl = h.temperature && h.temperature.feels_like_f;
            return fl !== null && fl !== undefined && fl > 32;
          });

          const bikeEl = document.getElementById('bike-callout');
          const bikeStatus = document.getElementById('bike-status');
          if (windOkForBike && feelsLikeAboveFreezing) {
            bikeEl.style.borderLeftColor = '#4caf50';
            bikeStatus.innerHTML = `Yes! Wind less than 6 kts, not freezing in the daytime.`;
          } else {
            bikeEl.style.borderLeftColor = '#e05020';
            const reasons = [];
            if (!windOkForBike) reasons.push(`too windy (${windAvgKts} kts)`);
            if (!feelsLikeAboveFreezing) reasons.push('freezing today');
            bikeStatus.innerHTML = reasons.join('; ');
          }

          // ── Sail callout ──
          // Criteria: wind dir green/yellow, wind speed green (6–17 kts), temp > 60°F
          // Show which hours today are good
          const goodSailHours = todayHourly.filter(h => {
            const wind = h.wind || {};
            const temp = h.temperature || {};
            const dirOk = windDirIsSailable(wind.direction_degrees);
            const speedOk = windSpeedIsSailGreen(msToKts(wind.speed_ms));
            const tempOk = temp.actual_f !== null && temp.actual_f !== undefined && temp.actual_f > 60;
            return dirOk && speedOk && tempOk;
          });

          const sailEl = document.getElementById('sail-callout');
          const sailStatus = document.getElementById('sail-status');
          const sailNextWindow = document.getElementById('sail-next-window');

          // Helper: build range labels from an array of good-sail hourly entries
          function fmtHour(h) {
            const ampm = h >= 12 ? 'pm' : 'am';
            const h12 = h % 12 === 0 ? 12 : h % 12;
            return `${h12}${ampm}`;
          }

          function buildRangeLabels(hourlyEntries) {
            const hours = hourlyEntries.map(h => Temporal.PlainDateTime.from(h.time).hour);
            const ranges = [];
            let rangeStart = hours[0];
            let rangeEnd = hours[0];
            for (let i = 1; i < hours.length; i++) {
              if (hours[i] === rangeEnd + 1) {
                rangeEnd = hours[i];
              } else {
                ranges.push([rangeStart, rangeEnd]);
                rangeStart = hours[i];
                rangeEnd = hours[i];
              }
            }
            ranges.push([rangeStart, rangeEnd]);
            return ranges.map(([start, end]) => {
              if (start === end) return fmtHour(start);
              const endNext = end + 1;
              const startAmpm = start >= 12 ? 'pm' : 'am';
              const endAmpm = endNext >= 12 ? 'pm' : 'am';
              if (startAmpm === endAmpm) {
                const startH12 = start % 12 === 0 ? 12 : start % 12;
                const endH12 = endNext % 12 === 0 ? 12 : endNext % 12;
                return `${startH12}-${endH12}${endAmpm}`;
              } else {
                return `${fmtHour(start)}-${fmtHour(endNext)}`;
              }
            });
          }

          if (goodSailHours.length > 0) {
            sailEl.style.borderLeftColor = '#4caf50';
            const rangeLabels = buildRangeLabels(goodSailHours);
            sailStatus.innerHTML = `Good hours:<br>${rangeLabels.join(', ')}`;
          } else {
            sailEl.style.borderLeftColor = '#e05020';
            sailStatus.textContent = 'No good sailing today.';
          }

          // Find next good sailing window after today
          const futureGoodSailHours = data.hourly.filter(h => {
            const dt = Temporal.PlainDateTime.from(h.time);
            const date = dt.toPlainDate();
            if (Temporal.PlainDate.compare(date, nowPlainDate) <= 0) return false;
            const wind = h.wind || {};
            const temp = h.temperature || {};
            const dirOk = windDirIsSailable(wind.direction_degrees);
            const speedOk = windSpeedIsSailGreen(msToKts(wind.speed_ms));
            const tempOk = temp.actual_f !== null && temp.actual_f !== undefined && temp.actual_f > 60;
            return dirOk && speedOk && tempOk;
          });

          if (futureGoodSailHours.length > 0) {
            // Group by day and find the first day with good hours
           const firstFutureDate = Temporal.PlainDateTime.from(futureGoodSailHours[0].time).toPlainDate();
            const firstDayGoodHours = futureGoodSailHours.filter(h => {
              const date = Temporal.PlainDateTime.from(h.time).toPlainDate();
              return Temporal.PlainDate.compare(date, firstFutureDate) === 0;
            });
            const rangeLabels = buildRangeLabels(firstDayGoodHours);
            let dayLabel;
            if (Temporal.PlainDate.compare(firstFutureDate, tomorrowPlainDate) === 0) {
              dayLabel = 'Tomorrow';
            } else {
              const d = firstFutureDate.toString();
              // Parse as local date to avoid UTC-offset day shift
              const [year, month, day] = d.split('-').map(Number);
              dayLabel = new Date(year, month - 1, day).toLocaleDateString(undefined, { weekday: 'long' });
            }
            sailNextWindow.style.display = '';
            sailNextWindow.innerHTML = `Next: ${dayLabel}<br>${rangeLabels.join(', ')}`;
          }

          // ── End callout logic ──────────────────────────────────────────

          data.hourly.forEach((h, i) => {
            const row = document.createElement('tr');
            const fmt = v => (v === null || v === undefined) ? '\u2014' : v;
            const temp = h.temperature || {};
            const wind = h.wind || {};
            const speedKts = msToKts(wind.speed_ms);
            row.innerHTML = `
              <td>${formatTime(h.time)}</td>
              <td data-value="${fmt(temp.actual_c)}" class="${getTempClass(temp.actual_c)}">${fmt(temp.actual_c)} / ${fmt(temp.actual_f)}</td>
              <td data-value="${fmt(temp.feels_like_c)}" class="${getTempClass(temp.feels_like_c)}">${fmt(temp.feels_like_c)} / ${fmt(temp.feels_like_f)}</td>
              <td data-value="${fmt(speedKts)}" class="${getWindSpeedClass(speedKts)}">${fmt(speedKts)}</td>
              <td data-value="${fmt(wind.direction_degrees)}" class="${getWindDirClass(wind.direction_degrees)}">${fmt(wind.direction_degrees)}</td>
              <td data-value="${fmt(h.precipitation_mm)}" class="${getPrecipClass(h.precipitation_mm)}">${fmt(h.precipitation_mm)}</td>
              <td data-value="${fmt(h.relative_humidity)}" class="${getHumidityClass(h.relative_humidity)}">${fmt(h.relative_humidity)}</td>
            `;
            tbody.appendChild(row);
          });
      });
    </script>
  </body>
</html>
